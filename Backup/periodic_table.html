<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Periodic Table of Elements</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e3a5f;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --glow: rgba(56,189,248,0.15);

    --c-alkali: #ef4444;
    --c-alkali-earth: #f97316;
    --c-transition: #3b82f6;
    --c-post: #8b5cf6;
    --c-metalloid: #14b8a6;
    --c-nonmetal: #22c55e;
    --c-halogen: #eab308;
    --c-noble: #ec4899;
    --c-lanthanide: #06b6d4;
    --c-actinide: #f59e0b;
  }

  .light {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8edf5;
    --border: #cbd5e1;
    --text: #1e293b;
    --text-muted: #94a3b8;
    --accent: #0284c7;
    --accent2: #6366f1;
    --glow: rgba(2,132,199,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .header-title h1 {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-title span {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    transition: all 0.2s;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .close-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    background: #ef4444;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: white;
    font-size: 1.1rem;
    font-weight: 700;
    transition: all 0.2s;
    line-height: 1;
  }

  .close-btn:hover {
    background: #dc2626;
    transform: scale(1.05);
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.3px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  /* TABLE WRAPPER */
  .table-wrapper {
    padding: 16px 20px;
    overflow-x: auto;
  }

  /* PERIODIC TABLE GRID */
  .pt-grid {
    display: grid;
    grid-template-columns: repeat(18, minmax(54px, 1fr));
    grid-template-rows: auto;
    gap: 3px;
    min-width: 1020px;
  }

  /* ELEMENT CELL */
  .el {
    position: relative;
    border-radius: 6px;
    padding: 5px 4px 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .el:hover {
    transform: scale(1.15);
    z-index: 10;
    border-color: rgba(255,255,255,0.5);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.2);
  }

  .el .atomic-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.7);
    align-self: flex-start;
    line-height: 1;
  }

  .light .el .atomic-num {
    color: rgba(0,0,0,0.5);
  }

  .el .symbol {
    font-family: 'Atkinson Hyperlegible', 'Inter', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.1;
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.01em;
  }

  .light .el .symbol {
    color: rgba(0,0,0,0.85);
  }

  .el .mass {
    font-family: 'Space Mono', monospace;
    font-size: 0.48rem;
    color: rgba(255,255,255,0.55);
    line-height: 1;
    margin-top: 1px;
  }

  .light .el .mass {
    color: rgba(0,0,0,0.45);
  }

  /* Category colors */
  .alkali        { background: color-mix(in srgb, var(--c-alkali) 30%, var(--surface2)); }
  .alkali-earth  { background: color-mix(in srgb, var(--c-alkali-earth) 30%, var(--surface2)); }
  .transition    { background: color-mix(in srgb, var(--c-transition) 30%, var(--surface2)); }
  .post-trans    { background: color-mix(in srgb, var(--c-post) 30%, var(--surface2)); }
  .metalloid     { background: color-mix(in srgb, var(--c-metalloid) 30%, var(--surface2)); }
  .nonmetal      { background: color-mix(in srgb, var(--c-nonmetal) 30%, var(--surface2)); }
  .halogen       { background: color-mix(in srgb, var(--c-halogen) 30%, var(--surface2)); }
  .noble-gas     { background: color-mix(in srgb, var(--c-noble) 30%, var(--surface2)); }
  .lanthanide    { background: color-mix(in srgb, var(--c-lanthanide) 30%, var(--surface2)); }
  .actinide      { background: color-mix(in srgb, var(--c-actinide) 30%, var(--surface2)); }

  .light .alkali        { background: color-mix(in srgb, var(--c-alkali) 20%, white); }
  .light .alkali-earth  { background: color-mix(in srgb, var(--c-alkali-earth) 20%, white); }
  .light .transition    { background: color-mix(in srgb, var(--c-transition) 20%, white); }
  .light .post-trans    { background: color-mix(in srgb, var(--c-post) 20%, white); }
  .light .metalloid     { background: color-mix(in srgb, var(--c-metalloid) 20%, white); }
  .light .nonmetal      { background: color-mix(in srgb, var(--c-nonmetal) 20%, white); }
  .light .halogen       { background: color-mix(in srgb, var(--c-halogen) 20%, white); }
  .light .noble-gas     { background: color-mix(in srgb, var(--c-noble) 20%, white); }
  .light .lanthanide    { background: color-mix(in srgb, var(--c-lanthanide) 20%, white); }
  .light .actinide      { background: color-mix(in srgb, var(--c-actinide) 20%, white); }

  /* Lanthanide / Actinide Series Label rows */
  .series-label {
    grid-column: 1 / 4;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 6px;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* SPACER */
  .spacer { visibility: hidden; }

  /* PERIOD LABELS */
  .period-label {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text-muted);
  }

  /* INFO BLOCK in center of period 1 row (H gap) */
  .center-info {
    grid-column: 2 / 13;
    grid-row: 1 / 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px;
  }

  .center-info .big-title {
    font-size: 1.6rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    letter-spacing: -1px;
  }

  .center-info .sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* MODAL OVERLAY */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 520px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes slideUp {
    from { transform: translateY(30px) scale(0.95); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .modal-header {
    padding: 20px 24px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .modal-element-hero {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .modal-symbol-box {
    width: 80px;
    height: 80px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15);
  }

  .light .modal-symbol-box {
    border-color: rgba(0,0,0,0.1);
  }

  .modal-symbol-box .m-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: rgba(255,255,255,0.6);
  }

  .light .modal-symbol-box .m-num {
    color: rgba(0,0,0,0.5);
  }

  .modal-symbol-box .m-sym {
    font-family: 'Atkinson Hyperlegible', 'Inter', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    color: white;
    line-height: 1;
    letter-spacing: 0.02em;
  }

  .light .modal-symbol-box .m-sym {
    color: rgba(0,0,0,0.85);
  }

  .modal-symbol-box .m-mass {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.5);
  }

  .light .modal-symbol-box .m-mass {
    color: rgba(0,0,0,0.4);
  }

  .modal-name-block h2 {
    font-family: 'Atkinson Hyperlegible', 'Inter', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: 0.01em;
  }

  .modal-name-block .category-badge {
    display: inline-block;
    margin-top: 6px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
    color: white;
  }

  .light .modal-name-block .category-badge {
    color: white;
  }

  .modal-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .modal-close:hover {
    background: #ef4444;
    border-color: #ef4444;
    color: white;
  }

  .modal-body {
    padding: 20px 24px 24px;
  }

  .props-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }

  .prop-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .prop-card.full {
    grid-column: 1 / -1;
  }

  .prop-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .prop-value {
    font-family: 'Inter', 'Atkinson Hyperlegible', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
  }

  .prop-value.mono {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    word-break: break-all;
    line-height: 1.5;
  }

  .prop-unit {
    font-size: 0.7rem;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 3px;
  }

  /* GAP LABEL CELLS in the grid */
  .gap-block {
    grid-column: 4 / 13;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
  }

  .section-gap {
    grid-column: 1 / -1;
    height: 6px;
  }

  .f-block-note {
    grid-column: 3 / 5;
    display: flex;
    align-items: center;
    font-size: 0.55rem;
    color: var(--text-muted);
    padding-left: 4px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">
    <h1>Periodic Table</h1>
    <span>118 Elements</span>
  </div>
  <div class="header-controls">
    <button class="theme-toggle" id="themeToggle">🌙 Dark Mode</button>
    <button class="close-btn" id="closeBtn" title="Close">✕</button>
  </div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-alkali)"></div>Alkali Metal</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-alkali-earth)"></div>Alkaline Earth</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-transition)"></div>Transition Metal</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-post)"></div>Post-Transition</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-metalloid)"></div>Metalloid</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-nonmetal)"></div>Nonmetal</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-halogen)"></div>Halogen</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-noble)"></div>Noble Gas</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-lanthanide)"></div>Lanthanide</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--c-actinide)"></div>Actinide</div>
</div>

<!-- TABLE -->
<div class="table-wrapper">
  <div class="pt-grid" id="ptGrid"></div>
</div>

<!-- ELEMENT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-element-hero">
        <div class="modal-symbol-box" id="mBox">
          <div class="m-num" id="mNum"></div>
          <div class="m-sym" id="mSym"></div>
          <div class="m-mass" id="mMass"></div>
        </div>
        <div class="modal-name-block">
          <h2 id="mName"></h2>
          <div class="category-badge" id="mCat"></div>
        </div>
      </div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="props-grid">
        <div class="prop-card">
          <div class="prop-label">Melting Point</div>
          <div class="prop-value" id="mMelt"></div>
        </div>
        <div class="prop-card">
          <div class="prop-label">Boiling Point</div>
          <div class="prop-value" id="mBoil"></div>
        </div>
        <div class="prop-card">
          <div class="prop-label">Electronegativity</div>
          <div class="prop-value" id="mElectroneg"></div>
        </div>
        <div class="prop-card">
          <div class="prop-label">Atomic Radius</div>
          <div class="prop-value" id="mRadius"></div>
        </div>
        <div class="prop-card full">
          <div class="prop-label">Electron Configuration</div>
          <div class="prop-value mono" id="mConfig"></div>
        </div>
        <div class="prop-card full">
          <div class="prop-label">Standard State · Discovery Year · Group/Period</div>
          <div class="prop-value" id="mExtra"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="periodic_table.js"></script>
</body>
</html>
